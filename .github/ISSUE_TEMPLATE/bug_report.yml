name: Bug report
description: Report a reproducible SSHGateW problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include passwords, private keys, TOTP seeds, or sensitive logs.
  - type: input
    id: version
    attributes:
      label: SSHGateW version
      placeholder: 0.7.1
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options: [Docker Compose, Single-binary installer, Manual installation]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected behavior and sanitized reproduction steps.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, SSH client, terminal, and relevant configuration without secrets.
