name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache: true
      - run: go test ./...
      - run: go vet ./...

  binaries:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: '1.26.x'
          cache: true
      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          version=${VERSION#v}
          mkdir -p dist
          for arch in amd64 arm64; do
            directory="sshgatew_${version}_linux_${arch}"
            mkdir -p "dist/${directory}"
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version}" \
              -o "dist/${directory}/sshgatew" ./cmd/sshgatew
            cp README.md LICENSE "dist/${directory}/"
            tar -C dist -czf "dist/${directory}.tar.gz" "$directory"
            rm -rf "dist/${directory}"
          done
          cd dist
          sha256sum *.tar.gz > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "SSHGateW $GITHUB_REF_NAME"

  container:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
